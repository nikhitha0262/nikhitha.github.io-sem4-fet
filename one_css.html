<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Document</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, #4facfe, #00f2fe);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Card container */
.container {
    background: white;
    padding: 30px;
    border-radius: 15px;
    text-align: center;
    width: 400px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

/* Headings */
h1 {
    margin-bottom: 5px;
}

h2 {
    color: gray;
    font-weight: normal;
    margin-bottom: 20px;
}

/* Paragraph */
p {
    line-height: 1.6;
}

/* Link button */
a {
    display: inline-block;
    margin-top: 15px;
    padding: 10px 20px;
    background: #4facfe;
    color: white;
    text-decoration: none;
    border-radius: 25px;
    transition: 0.3s;
}

a:hover {
    background: #0077ff;
}
</style>

</head>

<body>

<div class="container">
    <h1>Nikhitha</h1>
    <h2>2nd Year Student / B.E in CS Engineering</h2>

    <p>
    I am a curious and motivated individual who enjoys learning new things and improving my skills.
    I like exploring different ideas and gaining knowledge that helps me grow personally and academically.
    </p>

    <a href="https://nikhitha0262.github.io/nikhitha.github.io-sem4-fet/">Assignment 1</a>
</div>

</body>
</html>
